syntax = "proto3";

package myrpc;

enum RpcErrorCode{
    RPC_OK = 0;

   RPC_SEND_FAILED = 100;
   RPC_CONNECTION_FAILED = 101;
    RPC_RECV_FAILED = 102;
    RPC_CALL_TIMEOUT = 103;
    
    RPC_BAD_REQUEST = 1000;
    RPC_FRAME_TOO_LARGE = 1001;
    RPC_PARSE_HEADER_FAILED = 1002;
    RPC_SERVICE_NOT_FOUND = 1003;
    RPC_METHOD_NOT_FOUND = 1004;
    RPC_PARSE_REQUEST_FAILED = 1005;
    RPC_SERIALIZE_RESPONSE_FAILED = 1006;
    RPC_INTERNAL_ERROR = 1007;

    RPC_REQUEST_ERROR = 2001;
}

message RpcHeader {
    uint64 request_id = 1;
    string service_name = 2;
    string method_name = 3;
    uint32 args_size = 4;
}

message RpcResponseHeader {
    uint64 request_id = 1;
    RpcErrorCode error_code = 2;
    string error_text = 3;
    uint32 response_size = 4;
}

